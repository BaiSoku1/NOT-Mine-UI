<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Script Source</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    background:#0f0f0f;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    width:420px;
    margin:120px auto;
    background:#161616;
    padding:25px;
    border-radius:10px;
    border:1px solid #2a2a2a;
}

h1{
    font-size:20px;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    background:#0d0d0d;
    border:1px solid #333;
    color:#fff;
    border-radius:5px;
}

button{
    margin-top:10px;
    width:100%;
    padding:10px;
    background:#b30000;
    border:none;
    color:white;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e00000;
}

.result{
    margin-top:15px;
    font-size:14px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="container">
<h1>Apply Script Source</h1>

<input type="text" id="key" placeholder="Enter Access Key">

<button onclick="apply()">Apply</button>

<div class="result" id="result"></div>
</div>

<script>
function apply(){

let key = document.getElementById("key").value

fetch("api.php?key="+key)
.then(r=>r.text())
.then(t=>{

document.getElementById("result").innerText = t

})
}
</script>

</body>
</html>
