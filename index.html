<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Script Source</title>

<style>
body{
background:#0b0b0b;
color:#e5e5e5;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#121212;
padding:30px;
width:400px;
border-radius:8px;
border:1px solid #1f1f1f;
}

.title{
font-size:20px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
background:#0a0a0a;
border:1px solid #2a2a2a;
color:white;
border-radius:5px;
}

button{
margin-top:10px;
width:100%;
padding:10px;
background:#b10000;
border:none;
border-radius:5px;
color:white;
cursor:pointer;
}

button:hover{
background:#d10000;
}

#result{
margin-top:15px;
font-size:13px;
color:#9e9e9e;
word-break:break-all;
}
</style>

</head>

<body>

<div class="box">

<div class="title">Script Source Apply</div>

<input id="key" placeholder="enter access key">

<button onclick="apply()">apply source</button>

<div id="result"></div>

</div>

<script>

function apply(){

let key = document.getElementById("key").value

fetch("api/verify.php?key="+key)
.then(r=>r.text())
.then(data=>{

if(data == "ok"){

let raw = location.origin + "/api/raw.php?token="+btoa(key)

document.getElementById("result").innerText =
"source ready:\n"+raw

}else{

document.getElementById("result").innerText =
"invalid key"

}

})

}

</script>

</body>
</html>
